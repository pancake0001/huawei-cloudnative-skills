  - huawei_analyze_cce_capacity_trend
  - huawei_scan_cce_availability_risk
  - huawei_analyze_cce_cost_optimization
references:
  - references/workflow.md
  - references/output-schema.md
guardrails:
  max_auto_risk: R1

