name: capacity-trend-forecaster
level: L4
domain: capacity-planning
description: Analyze Huawei Cloud CCE periodic capacity trends, forecast resource bottlenecks, simulate elasticity policies, generate charts and reports, compare recurring history records, and recommend HPA or node autoscaler optimization.
tools:
  - huawei_analyze_cce_capacity_trend
  - huawei_list_cce_clusters
  - huawei_get_kubernetes_nodes
  - huawei_list_cce_nodepools
  - huawei_get_cce_deployments
  - huawei_list_cce_hpas
  - huawei_get_cce_node_metrics_topN
  - huawei_get_aom_metrics
  - huawei_generate_cce_hpa_manifest
  - huawei_configure_cce_hpa
references:
  - references/workflow.md
  - references/simulation-rules.md
  - references/output-schema.md
guardrails:
  max_auto_risk: R1
