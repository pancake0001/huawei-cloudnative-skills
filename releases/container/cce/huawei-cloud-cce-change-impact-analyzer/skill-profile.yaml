  - huawei_list_cce_secrets
  - huawei_list_cce_nodepools
  - huawei_list_security_groups
  - huawei_list_vpc_acls
  - huawei_workload_rollout_diagnose
  - huawei_network_failure_diagnose
  - huawei_node_failure_diagnose
references:
  - references/workflow.md
  - references/capability-map.md
  - references/output-schema.md
  - references/risk-rules.md
guardrails:
  max_auto_risk: R1
