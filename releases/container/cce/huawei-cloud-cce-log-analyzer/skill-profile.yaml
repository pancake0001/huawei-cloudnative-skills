name: huawei-cloud-cce-log-analyzer
level: L2
domain: observability
description: Query and analyze Kubernetes stdout logs and Huawei Cloud LTS logs for CCE workloads.
tools:
  - huawei_get_pod_logs
  - huawei_get_cce_logconfigs
  - huawei_create_cce_logconfig
  - huawei_delete_cce_logconfig
  - huawei_get_application_logconfigs
  - huawei_query_cce_audit_logs
  - huawei_query_application_logs
  - huawei_query_application_recent_logs
  - huawei_analyze_application_logs
references:
  - references/workflow.md
  - references/risk-rules.md
  - references/output-schema.md
guardrails:
  max_auto_risk: R1
