apiVersion: v1
kind: Namespace
metadata:
  name: aicli
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicli
  namespace: aicli
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aicli
  template:
    metadata:
      labels:
        app: aicli
    spec:
      containers:
        - name: aicli
          image: swr.cn-north-4.myhuaweicloud.com/pancake/aicli:with-skills
          imagePullPolicy: IfNotPresent
          stdin: true
          tty: true
          env:
            - name: TERM
              value: xterm-256color
            - name: LANG
              value: en_US.UTF-8
            - name: HW_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aicli-credentials
                  key: accessKey
            - name: HW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: aicli-credentials
                  key: secretKey
            - name: HW_REGION_NAME
              valueFrom:
                secretKeyRef:
                  name: aicli-credentials
                  key: regionId
---
apiVersion: v1
kind: Secret
metadata:
  name: aicli-credentials
  namespace: aicli
type: Opaque
stringData:
  accessKey: ""
  secretKey: ""
  regionId: "cn-north-4"
